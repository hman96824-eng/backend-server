services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend-app
    ports:
      - "5000:5000"
    env_file:
      - .env
    # We pass the Atlas URI directly from your .env file
    environment:
      - MONGO_URI=${MONGO_URI}
    restart: unless-stopped
    
  mongo:
    image: mongo:7
    container_name: backend-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
