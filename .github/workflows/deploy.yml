name: Deploy to Amazon EC2

on:
  push:
    branches: [ "main" ] # Runs every time you push to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Updated from v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4 # Updated from v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1 

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2 # Updated from v1

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPO: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: latest
        run: |
          # Build the docker image
          docker build -t $ECR_REGISTRY/$REPO:$IMAGE_TAG .
          # Push it to your ECR repo: zee-server
          docker push $ECR_REGISTRY/$REPO:$IMAGE_TAG

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Login to ECR
            aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
            
            # 2. Kill anything on 5000
            docker rm -f $(docker ps -q --filter "publish=5000") || true
            sudo fuser -k 5000/tcp || true
            docker rm -f zee-container || true
            
            # 3. Pull fresh image
            docker pull ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest
            
            # 4. Run with the MONGO_URI variable injected
            docker run -d \
              -p 5000:5000 \
              --name zee-container \
              -e MONGO_URI="${{ secrets.MONGO_URI }}" \
              -e PORT="${{ secrets.PORT }}" \
              ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest